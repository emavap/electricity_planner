# REQUIRED: Install "Gauge Card Pro" from HACS
# https://github.com/benjamin-dcs/gauge-card-pro
# REQUIRED: Install "ApexCharts Card" from HACS
# https://github.com/RomRider/apexcharts-card
# REQUIRED: Install "Button Card" from HACS
# https://github.com/custom-cards/button-card
# This bundled dashboard is a static single-phase release snapshot.
# The integration-managed dashboard is the canonical single-phase layout.
# This dashboard uses dynamic thresholds that update in real-time:
# - Buy price gauge: green → yellow (dynamic threshold) → red (max threshold)
# - Feed-in price gauge: red (negative) → yellow (zero) → green (feed-in threshold)
# - Manual override buttons prompt for duration dynamically
views:
  - title: Electricity Planner
    path: electricity-planner
    icon: mdi:lightning-bolt
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## ⚡ Electricity Planner Dashboard
          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:gauge-card-pro
                entity: sensor.electricity_planner_current_electricity_price
                header: Buy price
                min: -0.9
                max: 0.9
                unit: "€/kWh"
                needle: true
                scale: "50px"
                segments: |-
                  {% set price_sensor = 'sensor.electricity_planner_current_electricity_price' %}
                  {% set dynamic_threshold = state_attr(price_sensor, 'dynamic_threshold') %}
                  {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics' %}
                  {% if states(decision_sensor) in ['unknown', 'unavailable', None] %}
                    {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
                  {% endif %}
                  {% set price_analysis = state_attr(decision_sensor, 'price_analysis') %}
                  {% set average_threshold = price_analysis.average_threshold if price_analysis else None %}
                  {% set fixed_threshold = states('sensor.electricity_planner_diagnostics_monitoring_price_threshold') | float(0) %}
                  {% set price_threshold = state_attr(price_sensor, 'price_threshold') %}

                  {# Prefer the actively used threshold from price analysis, fallback to average (if available) or configured fixed #}
                  {% if price_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set max_threshold = price_threshold | float(0) %}
                  {% elif average_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set max_threshold = average_threshold | float(0) %}
                  {% else %}
                    {% set max_threshold = fixed_threshold %}
                  {% endif %}

                  {# Determine the dynamic threshold if present and clamp it to the maximum threshold so segments stay ordered #}
                  {% if dynamic_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set threshold = (dynamic_threshold | float(0)) %}
                  {% else %}
                    {% set threshold = max_threshold %}
                  {% endif %}
                  {% if threshold > max_threshold %}
                    {% set threshold = max_threshold %}
                  {% endif %}
                  {{
                    [
                      { "from": -0.9, "color": "green" },
                      { "from": threshold, "color": "yellow" },
                      { "from": max_threshold, "color": "red" }
                    ]
                  }}

              - type: custom:gauge-card-pro
                entity: sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price
                header: Feed-in price
                min: -0.9
                max: 0.9
                unit: "€/kWh"
                needle: true
                scale: "50px"
                segments: |-
                  {% set threshold = states('sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold') | float(0) %}
                  {{
                    [
                      { "from": -0.9, "color": "red" },
                      { "from": 0, "color": "yellow" },
                      { "from": threshold, "color": "green" }
                    ]
                  }}

          - type: grid
            square: false
            columns: 3
            cards:
              - type: button
                entity: binary_sensor.electricity_planner_battery_charge_from_grid
                name: Battery
                icon: mdi:battery-charging
                icon_height: 60px
                show_name: true
                show_state: true

              - type: button
                entity: binary_sensor.electricity_planner_car_charge_from_grid
                name: Car
                icon: mdi:car-electric
                icon_height: 60px
                show_name: true
                show_state: true
                tap_action:
                  action: more-info

              - type: button
                entity: binary_sensor.electricity_planner_data_nord_pool_available
                name: Data OK
                icon: mdi:database-check
                icon_height: 60px
                show_name: true
                show_state: true

          - type: grid
            square: false
            columns: 2
            cards:
              - type: gauge
                name: Battery SOC
                entity: sensor.electricity_planner_battery_soc_average
                min: 0
                max: 100
                unit: "%"
                needle: true
                severity:
                  red: 0
                  yellow: 30
                  green: 70

          - type: markdown
            title: Active Grid Charging Limit
            content: |
              {% set sunny_entity = 'number.electricity_planner_max_soc_threshold_sunny' %}
              {% set normal_entity = 'number.electricity_planner_max_soc_threshold' %}
              {% set sunny_active = state_attr(sunny_entity, 'sunny_day_active') %}
              {% if sunny_active %}
              🌞 **High Solar forecast** — grid charges battery to **{{ states(sunny_entity) }}%** max
              {% else %}
              🔋 **Standard** — grid charges battery to **{{ states(normal_entity) }}%** max
              {% endif %}

              _Solar forecast: {{ state_attr(sunny_entity, 'solar_forecast_kwh') or 'not available' }}_
              _Sunny mode trigger: ≥ {{ states('number.electricity_planner_sunny_forecast_threshold_kwh') }} kWh_

          - type: entities
            title: Status
            show_header_toggle: false
            entities:
              - entity: sensor.electricity_planner_diagnostics_monitoring_entity_status
                name: Entity status
              - entity: binary_sensor.electricity_planner_data_nord_pool_available
                name: Data OK
              - entity: sensor.electricity_planner_data_unavailable_duration
                name: Data unavailable time
              - entity: sensor.electricity_planner_battery_soc_average
                name: Battery SOC
              - entity: sensor.electricity_planner_solar_surplus_power
                name: Solar surplus
              - entity: binary_sensor.electricity_planner_solar_producing_power
                name: Solar producing
              - entity: binary_sensor.electricity_planner_price_below_threshold
                name: Price below threshold

          - type: entities
            title: Battery Controls
            show_header_toggle: false
            entities:
              - entity: number.electricity_planner_max_soc_threshold
                name: "Grid Max SOC"
                icon: mdi:battery-charging-high
              - entity: number.electricity_planner_max_soc_threshold_sunny
                name: "Grid Max SOC (high solar)"
                icon: mdi:weather-sunny
              - entity: number.electricity_planner_max_soc_threshold_solar
                name: "Solar Max SOC"
                icon: mdi:solar-power-variant
              - entity: number.electricity_planner_sunny_forecast_threshold_kwh
                name: "Sunny Forecast Trigger"
                icon: mdi:weather-partly-cloudy
              - entity: number.electricity_planner_arbitrage_mode_reserve_soc
                name: "Arbitrage Reserve SOC"
                icon: mdi:battery-arrow-down-outline
              - entity: number.electricity_planner_arbitrage_mode_deadline_hour
                name: "Arbitrage Deadline Hour"
                icon: mdi:clock-end
              - entity: number.electricity_planner_negative_buy_threshold
                name: "Negative Arbitrage Buy Threshold"
                icon: mdi:cash-minus
              - entity: switch.electricity_planner_car_permissive_mode
                name: Car permissive
                icon: mdi:car-electric-outline
              - entity: switch.electricity_planner_arbitrage_mode
                name: Arbitrage mode
                icon: mdi:battery-arrow-down-outline
              - entity: switch.electricity_planner_negative_arbitrage_buy_mode
                name: Negative Arbitrage Buy Mode
                icon: mdi:battery-arrow-up-outline
              - entity: switch.electricity_planner_disable_battery_charging
                name: Disable Battery Charging
                icon: mdi:battery-off

          - type: markdown
            content: |
              **Battery Controls — quick reference**

              *Grid charging limits*

              - **Grid Max SOC** (default 70%): SOC ceiling for grid charging on normal days. The planner stops buying once any battery reaches this level.
              - **Grid Max SOC (high solar)** (default 35%): Lower ceiling that replaces *Grid Max SOC* whenever tomorrow's solar forecast exceeds the *Sunny Forecast Trigger*. Preserves capacity for free solar.
              - **Solar Max SOC** (default 50%): Independent ceiling for solar absorption. Once batteries cross this level, surplus is offered to the EV or exported instead of being absorbed.
              - **Sunny Forecast Trigger** (default 5 kWh): Tomorrow-forecast value above which *Grid Max SOC (high solar)* activates. Read after the configured forecast start hour (default 20:00).

              *Arbitrage*

              - **Arbitrage Reserve SOC** (default 40%): Minimum battery SOC kept in reserve while *Arbitrage Mode* is active — exports stop once SOC reaches this floor.
              - **Arbitrage Deadline Hour** (default 12): Local hour by which both arbitrage *sell* and *Negative Arbitrage Buy* slot windows must finish. Protects the morning solar harvest.
              - **Negative Arbitrage Buy Threshold** (default −0.05 €/kWh): Net buy price at or below which the planner requests peak-limited grid import (truly paid-to-consume). More-negative values mean stricter activation.

              *Mode toggles*

              - **Car permissive**: Relaxes car-charging hysteresis — accepts ~20% higher prices and bypasses the minimum-window check for ad-hoc top-ups.
              - **Arbitrage mode**: Enables battery-to-grid export during high feed-in prices, down to *Arbitrage Reserve SOC*, before the deadline hour.
              - **Negative Arbitrage Buy Mode**: Enables peak-limited grid import (and solar export curtailment) during net-negative price slots.
              - **Disable Battery Charging**: Persistently blocks all grid charging into batteries, overriding every automatic strategy.

          - type: entities
            title: Decisions
            show_header_toggle: false
            entities:
              - entity: sensor.electricity_planner_decision_diagnostics
                name: Planner decision summary
              - entity: binary_sensor.electricity_planner_battery_charge_from_grid
                name: Battery charging
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_battery_charge_from_grid
                attribute: reason
                name: Battery reason
              - entity: binary_sensor.electricity_planner_car_charge_from_grid
                name: Car charging
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_car_charge_from_grid
                attribute: reason
                name: Car reason
              - entity: binary_sensor.electricity_planner_solar_feed_in_grid
                name: Solar feed-in
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_solar_feed_in_grid
                attribute: reason
                name: Feed-in reason
              - entity: sensor.electricity_planner_car_charger_limit
                name: Car charger limit
              - type: attribute
                entity: sensor.electricity_planner_car_charger_limit
                attribute: charger_limit_reason
                name: Charger limit reason
              - entity: sensor.electricity_planner_grid_setpoint
                name: Grid setpoint
              - type: attribute
                entity: sensor.electricity_planner_grid_setpoint
                attribute: grid_setpoint_reason
                name: Grid setpoint reason
              - type: attribute
                entity: switch.electricity_planner_arbitrage_mode
                attribute: reason
                name: Arbitrage reason
              - type: attribute
                entity: switch.electricity_planner_negative_arbitrage_buy_mode
                attribute: reason
                name: Negative Arbitrage Buy reason

          - type: custom:apexcharts-card
            header:
              title: Electricity Buy Prices (History + Future)
              show: true
            graph_span: 38h
            span:
              start: hour
              offset: -2h
            now:
              show: true
              label: Now
            apex_config:
              chart:
                height: 350
              tooltip:
                enabled: false
              xaxis:
                labels:
                  datetimeFormatter:
                    hour: "HH:mm"
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#7f8c8d"
                    strokeDashArray: 4
                    label:
                      text: Break-even
              yaxis:
                decimalsInFloat: 4
                tickAmount: 20
                labels:
                  formatter: |
                    EVAL:function(value) {
                      return value.toFixed(4) + ' €/kWh';
                    }
            series:
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Transport cost
                type: line
                stroke_width: 1
                color: "#b9770e"
                curve: straight
                opacity: 0.85
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.transport_cost ?? 0];
                  });
                show:
                  legend_value: false
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Raw market price
                type: line
                stroke_width: 1
                color: "#566573"
                curve: straight
                opacity: 0.8
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.raw_price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Total buy price
                type: line
                stroke_width: 3
                color: "#1f618d"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Max Threshold
                type: line
                stroke_width: 2
                color: "#c0392b"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const currentPriceEntity = hass.states['sensor.electricity_planner_current_electricity_price'];
                  const diagnosticsEntity = hass.states['sensor.electricity_planner_decision_diagnostics'] ?? hass.states['sensor.electricity_planner_decision_diagnostics_diagnostic'];
                  const priceAnalysis = diagnosticsEntity?.attributes?.price_analysis;
                  const activeThreshold = currentPriceEntity?.attributes?.price_threshold;
                  const diagnosticsThreshold = priceAnalysis?.price_threshold;

                  const maxThresholdEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_price_threshold'];
                  const fixedThreshold = maxThresholdEntity ? parseFloat(maxThresholdEntity.state) : 0.15;

                  let maxThreshold = fixedThreshold;
                  if (activeThreshold != null && activeThreshold !== undefined) {
                    maxThreshold = parseFloat(activeThreshold);
                  } else if (diagnosticsThreshold != null && diagnosticsThreshold !== undefined) {
                    maxThreshold = parseFloat(diagnosticsThreshold);
                  }

                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }

                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();

                  return [
                    [startTime, maxThreshold],
                    [endTime, maxThreshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Dynamic Threshold
                type: line
                stroke_width: 3
                color: "#e67e22"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const currentPriceEntity = hass.states['sensor.electricity_planner_current_electricity_price'];
                  const dynamicThreshold = currentPriceEntity?.attributes?.dynamic_threshold;

                  if (dynamicThreshold == null || dynamicThreshold === undefined) {
                    return [];
                  }

                  const threshold = parseFloat(dynamicThreshold);

                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }

                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();

                  return [
                    [startTime, threshold],
                    [endTime, threshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Negative Arbitrage Buy Threshold
                type: line
                stroke_width: 2
                color: "#16a085"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const buySwitch = hass.states['switch.electricity_planner_negative_arbitrage_buy_mode'];
                  const threshold = buySwitch?.attributes?.threshold;
                  if (buySwitch?.state !== 'on' || threshold == null || threshold === undefined) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, parseFloat(threshold)],
                    [endTime, parseFloat(threshold)]
                  ];
          - type: custom:apexcharts-card
            header:
              title: Electricity Sell Prices (History + Future)
              show: true
            graph_span: 38h
            span:
              start: hour
              offset: -2h
            now:
              show: true
              label: Now
            apex_config:
              chart:
                height: 300
              tooltip:
                enabled: false
              xaxis:
                labels:
                  datetimeFormatter:
                    hour: "HH:mm"
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#7f8c8d"
                    strokeDashArray: 4
                    label:
                      text: Break-even
              yaxis:
                decimalsInFloat: 4
                tickAmount: 16
                labels:
                  formatter: |
                    EVAL:function(value) {
                      return value.toFixed(4) + ' €/kWh';
                    }
            series:
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Raw market price
                type: line
                stroke_width: 1
                color: "#566573"
                curve: straight
                opacity: 0.8
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.raw_price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Net feed-in price
                type: line
                stroke_width: 3
                color: "#1d8348"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const feedInEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price'];
                  const multiplier = parseFloat(feedInEntity?.attributes?.feedin_multiplier ?? 1);
                  const offset = parseFloat(feedInEntity?.attributes?.feedin_offset ?? 0);
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    const rawPrice = interval.raw_price ?? 0;
                    return [new Date(interval.start).getTime(), (rawPrice * multiplier) + offset];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Feed-in Threshold
                type: line
                stroke_width: 2
                color: "#d4ac0d"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const thresholdEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold'];
                  const threshold = thresholdEntity ? parseFloat(thresholdEntity.state) : null;
                  if (threshold == null || Number.isNaN(threshold)) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, threshold],
                    [endTime, threshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Arbitrage Threshold
                type: line
                stroke_width: 2
                color: "#7d3c98"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const arbitrageSwitch = hass.states['switch.electricity_planner_arbitrage_mode'];
                  const threshold = arbitrageSwitch?.attributes?.arbitrage_price_threshold;
                  if (arbitrageSwitch?.state !== 'on' || threshold == null || threshold === undefined) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, parseFloat(threshold)],
                    [endTime, parseFloat(threshold)]
                  ];

          - type: markdown
            title: Price components
            content: |
              **Total price:** {{ states('sensor.electricity_planner_current_electricity_price') | float(0) | round(4) }} €/kWh

              **Energy market price:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'raw_current_price') | float(0) | round(4) }} €/kWh

              **Transport cost:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'transport_cost') | float(0) | round(4) }} €/kWh

          - type: grid
            square: false
            columns: 2
            cards:
              - type: markdown
                title: Price adjustments
                content: |
                  **Highest price today:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'highest_price') | float(0) | round(4) }} €/kWh

                  **Lowest price today:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'lowest_price') | float(0) | round(4) }} €/kWh

                  **Raw Nord Pool price:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'raw_current_price') | float(0) | round(4) }} €/kWh

                  **Transport cost:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'transport_cost') | float(0) | round(4) }} €/kWh

                  **Consumption multiplier:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'price_adjustment_multiplier') | float(0) | round(4) }}

                  **Consumption offset:** {{ state_attr('sensor.electricity_planner_current_electricity_price', 'price_adjustment_offset') | float(0) | round(4) }} €/kWh

                  **Feed-in multiplier:** {{ state_attr('sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price', 'feedin_multiplier') | float(0) | round(4) }}

                  **Feed-in offset:** {{ state_attr('sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price', 'feedin_offset') | float(0) | round(4) }} €/kWh

                  **Feed-in threshold:** {{ states('sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold') | float(0) | round(4) }} €/kWh

              - type: markdown
                title: Thresholds
                content: |
                  **Max price threshold:** {{ states('sensor.electricity_planner_diagnostics_monitoring_price_threshold') | float(0) | round(4) }} €/kWh

                  **Dynamic threshold:** {% set dyn_threshold = state_attr('sensor.electricity_planner_current_electricity_price', 'dynamic_threshold') %}{{ (dyn_threshold | float(0) | round(4) ~ ' €/kWh') if dyn_threshold != None else 'Not active' }}

                  {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics' %}
                  {% if states(decision_sensor) in ['unknown', 'unavailable', None] %}
                    {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
                  {% endif %}
                  **Average threshold:** {% set price_analysis = state_attr(decision_sensor, 'price_analysis') %}{{ (price_analysis['average_threshold'] | float(0) | round(4) ~ ' €/kWh') if price_analysis and price_analysis.get('average_threshold') != None else 'Not available' }}

                  **Feed-in threshold:** {{ states('sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold') | float(0) | round(4) }} €/kWh

                  _Note: To toggle average threshold mode, go to Settings → Devices & Services → Electricity Planner → Configure_

          - type: markdown
            title: Algorithm thresholds
            content: |
              **Very low price threshold:** {{ states('sensor.electricity_planner_diagnostics_monitoring_very_low_price_threshold') }}%

              **Emergency SOC:** {{ states('sensor.electricity_planner_diagnostics_monitoring_emergency_soc_threshold') }}%

              **Significant solar:** {{ states('sensor.electricity_planner_diagnostics_monitoring_significant_solar_threshold') }}W

              {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics' %}
              {% if states(decision_sensor) in ['unknown', 'unavailable', None] %}
              {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
              {% endif %}
              **Min car charging duration:** {% set config_limits = state_attr(decision_sensor, 'configured_limits') %}{{ config_limits.get('min_car_charging_duration', 'unknown') if config_limits else 'unknown' }} hours

              {% set sunny_entity = 'number.electricity_planner_max_soc_threshold_sunny' %}
              {% if states(sunny_entity) not in ['unknown', 'unavailable', None] %}
              **High Solar mode:** {% if state_attr(sunny_entity, 'sunny_day_active') %}🌞 Active (grid max SOC: {{ states(sunny_entity) }}%){% else %}Inactive (forecast below threshold){% endif %}

              **Solar forecast:** {{ state_attr(sunny_entity, 'solar_forecast_kwh') or 'not available' }}
              {% endif %}

              _Note: To change car charging duration, go to Settings → Devices & Services → Electricity Planner → Configure_

          - type: custom:apexcharts-card
            header:
              show: true
              title: Price & Decisions (24h)
            graph_span: 24h
            span:
              end: hour
            apex_config:
              chart:
                height: 320
              tooltip:
                shared: true
              dataLabels:
                enabled: false
              markers:
                size: 0
              xaxis:
                type: datetime
                labels:
                  datetimeFormatter:
                    hour: "HH:mm"
              yaxis:
                - id: price
                  decimalsInFloat: 4
                  labels:
                    formatter: |
                      EVAL:function(value) {
                        return value.toFixed(4) + ' €/kWh';
                      }
                - id: decisions
                  opposite: true
                  min: -0.05
                  max: 1.05
                  title:
                    text: "Decision active"
                  labels:
                    formatter: |
                      EVAL:function(value) {
                        if (value >= 0.75) { return 'On'; }
                        if (value <= 0.25) { return 'Off'; }
                        return '';
                      }
            series:
              - entity: sensor.electricity_planner_current_electricity_price
                name: Buy price
                type: line
                curve: smooth
                stroke_width: 2
                color: "#1f618d"
                float_precision: 4
                yaxis_id: price
                show:
                  legend_value: false
              - entity: sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price
                name: Sell price
                type: line
                curve: smooth
                stroke_width: 2
                color: "#1d8348"
                float_precision: 4
                yaxis_id: price
                show:
                  legend_value: false
              - entity: binary_sensor.electricity_planner_battery_charge_from_grid
                name: Battery charging
                type: line
                yaxis_id: decisions
                curve: stepline
                stroke_width: 1
                color: "#e74c3c"
                transform: |
                  const normalized = typeof x === 'string' ? x.toLowerCase() : x;
                  return normalized === 'on' || normalized === 'true' || normalized === true || normalized === 1 ? 1 : 0;
                show:
                  legend_value: false
              - entity: binary_sensor.electricity_planner_car_charge_from_grid
                name: Car charging
                type: line
                yaxis_id: decisions
                curve: stepline
                stroke_width: 1
                color: "#f39c12"
                transform: |
                  const normalized = typeof x === 'string' ? x.toLowerCase() : x;
                  return normalized === 'on' || normalized === 'true' || normalized === true || normalized === 1 ? 0.8 : 0;
                show:
                  legend_value: false

          - type: markdown
            title: Price Forecast Insights
            content: |
              {% set forecast = states('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights') %}
              {% set forecast_available = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'available') %}
              {% set cheapest_price = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'cheapest_interval_price') %}
              {% if forecast_available and cheapest_price is not none %}
              {% set is_stale = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'stale') %}
              {% set timeline_generated_at = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'timeline_generated_at') %}
              {% set cheapest_start = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'cheapest_interval_start') %}
              {% set cheapest_end = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'cheapest_interval_end') %}
              {% set best_window_start = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'best_window_start') %}
              {% set best_window_end = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'best_window_end') %}
              {% set best_window_hours = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'best_window_hours') %}
              {% set best_window_price = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'best_window_average_price') %}
              {% set evaluated_at = state_attr('sensor.electricity_planner_diagnostics_monitoring_price_forecast_insights', 'evaluated_at') %}

              {% if is_stale %}
              ⚠️ **Forecast data is stale** - Nord Pool price data temporarily unavailable

              _Last generated at {{ timeline_generated_at | default('unknown', true) | as_datetime | default(timeline_generated_at) | string if timeline_generated_at else 'unknown' }}_

              ---

              {% endif %}
              **Cheapest upcoming interval:**

              - **Time:** {{ cheapest_start | as_datetime | default(cheapest_start) | string if cheapest_start else 'unknown' }} - {{ cheapest_end | as_datetime | default(cheapest_end) | string if cheapest_end else 'unknown' }}
              - **Price:** {{ cheapest_price | float(0) | round(4) }} €/kWh

              {% if best_window_start %}
              **Best charging window ({{ best_window_hours }}h):**

              - **Time:** {{ best_window_start | as_datetime | default(best_window_start) | string }} - {{ best_window_end | as_datetime | default(best_window_end) | string }}
              - **Average price:** {{ best_window_price | float(0) | round(4) }} €/kWh
              {% else %}
              **Best charging window:** Not enough consecutive low-price hours available
              {% endif %}

              {% if not is_stale and evaluated_at %}
              _Evaluated at {{ evaluated_at | as_datetime | default(evaluated_at) | string }}_
              {% endif %}
              {% else %}
              _Forecast not available_

              **Requirements:**
              - Nord Pool config entry must be configured in Electricity Planner settings
              - Go to: Settings → Devices & Services → Electricity Planner → Configure
              - Enter your Nord Pool integration config entry ID

              _This feature provides detailed price forecast analysis including cheapest intervals and best charging windows._
              {% endif %}

          # Manual Override Controls
          - type: markdown
            title: Manual override status
            content: >
              {% set diag_entity = 'sensor.electricity_planner_decision_diagnostics' %}
              {% if states(diag_entity) in ['unknown', 'unavailable', None] %}
              {% set diag_entity = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
              {% endif %}
              {% set decisions = state_attr(diag_entity, 'decisions') %}
              {% set overrides = decisions.manual_overrides if decisions else state_attr(diag_entity, 'manual_overrides') %}
              {% if overrides %}
              {% for key, value in overrides.items() %}
              {% set target_name = {
                'battery_grid_charging': 'Battery charging',
                'arbitrage_mode': 'Arbitrage mode',
                'car_grid_charging': 'Car charging',
                'charger_limit': 'Charger limit',
                'grid_setpoint': 'Grid setpoint'
              }.get(key, key | replace('_', ' ') | title) %}
              {% set mode = 'enabled' if key == 'arbitrage_mode' else ('charging' if value.value else 'waiting') %}
              {% set until = value.expires_at | default(None) %}
              {% set reason = value.reason | default('') %}
              **{{ target_name }}:** {{ mode }}{% if until %} (until {{ as_datetime(until).astimezone().strftime('%H:%M') }}){% endif %}{% if reason %} — {{ reason }}{% endif %}

              {% endfor %}
              {% else %}
              _No manual overrides active_
              {% endif %}

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Battery charge
                icon: mdi:battery-arrow-up
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.set_manual_override
                  service_data: |
                    [[[
                      const input = prompt('Battery override duration (minutes)', '120');
                      if (input === null) {
                        return;
                      }
                      const minutes = parseInt(input, 10);
                      const duration = Number.isFinite(minutes) ? Math.min(Math.max(minutes, 1), 1440) : 120;
                      return {
                        target: 'battery',
                        action: 'force_charge',
                        duration,
                        reason: 'Dashboard boost'
                      };
                    ]]]
