alias: Solar Feed-in Control + Huawei Reload
description: >-
  Apply the inverter derating target computed by Electricity Planner. The
  planner owns all feed-in and derating logic; this automation just writes
  the recommended target to the Huawei inverter entity. Reloads the Huawei
  integration if the derating entity stays unavailable for 5 minutes.
triggers:
  - trigger: state
    entity_id: sensor.electricity_planner_automation_controls_inverter_derating_target
    id: control
  - trigger: time_pattern
    minutes: "/2"
    seconds: "0"
    id: control
  - trigger: state
    entity_id: number.inverter_power_derating
    to: unavailable
    for:
      minutes: 5
    id: reload_huawei
  - trigger: state
    entity_id: number.inverter_power_derating
    to: unknown
    for:
      minutes: 5
    id: reload_huawei
conditions: []
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: reload_huawei
        sequence:
          - action: homeassistant.reload_config_entry
            data:
              entry_id: 01JPJ86WM1CH015N836EWQRB6G
      - conditions:
          - condition: trigger
            id: control
          - condition: template
            value_template: >-
              {{
                has_value('sensor.electricity_planner_automation_controls_inverter_derating_target') and
                has_value('number.inverter_power_derating')
              }}
        sequence:
          - variables:
              target_limit_w: >-
                {{ states('sensor.electricity_planner_automation_controls_inverter_derating_target') | int(0) }}
              current_limit_w: >-
                {{ states('number.inverter_power_derating') | int(0) }}
              write_delta_w: >-
                {{ (target_limit_w - current_limit_w) | abs }}
          - condition: template
            value_template: >-
              {{
                (target_limit_w < current_limit_w and write_delta_w >= 50) or
                (target_limit_w >= current_limit_w and write_delta_w >= 100)
              }}
          - action: number.set_value
            target:
              entity_id: number.inverter_power_derating
            data:
              value: "{{ target_limit_w }}"
mode: single
