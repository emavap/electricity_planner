- type: markdown
  title: Grid Setpoint per Phase (Current)
  content: |
    {% set phase_results = state_attr('sensor.electricity_planner_grid_setpoint', 'phase_results') or state_attr('binary_sensor.electricity_planner_battery_charge_from_grid', 'phase_results') %}
    {% set phase_details = state_attr('sensor.electricity_planner_decision_diagnostics', 'phase_details') or state_attr('sensor.electricity_planner_decision_diagnostics_diagnostic', 'phase_details') %}
    {% if phase_results %}
    | Phase | Actual grid | Setpoint | Battery | Car | Limit |
    |---|---:|---:|---:|---:|---:|
    {% for phase_id, label in [('phase_1', 'L1'), ('phase_2', 'L2'), ('phase_3', 'L3')] %}
    {% set phase = phase_results[phase_id] if phase_id in phase_results else None %}
    {% set details = phase_details[phase_id] if phase_details and phase_id in phase_details else None %}
    | {{ label }} | {% if details and details.grid_power is not none %}{{ details.grid_power }} W{% else %}N/A{% endif %} | {{ phase.grid_setpoint if phase else 0 }} W | {{ phase.grid_components.battery if phase else 0 }} W | {{ phase.grid_components.car if phase else 0 }} W | {{ phase.charger_limit if phase else 0 }} W |
    {% endfor %}
    {% else %}
    _Phase data unavailable_
    {% endif %}

- type: markdown
  content: |
    ### Notes
    - **Grid setpoint** = Battery component + Car component per phase
    - **Capacity share** = % of total battery capacity assigned to each phase
    - **Charger limit** = Maximum power the car charger can use on this phase
    - Battery power is distributed proportionally based on capacity
    - Car power is distributed equally across phases with car sensors
