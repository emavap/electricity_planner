- type: markdown
  content: |
    ## 🔀 Three-Phase Details

    The Overview, Controls, Prices, and Diagnostics views show the shared
    planner state for the whole installation. The cards on this view show
    how battery charging, car charging, and grid setpoints are distributed
    across L1, L2, and L3.

- type: entities
  title: Three-phase source entities
  show_header_toggle: false
  entities:
    - entity: binary_sensor.electricity_planner_battery_charge_from_grid
      name: Battery charging decision
    - entity: binary_sensor.electricity_planner_car_charge_from_grid
      name: Car charging decision
    - entity: sensor.electricity_planner_grid_setpoint
      name: Aggregate grid setpoint
    - entity: sensor.electricity_planner_grid_setpoint_phase_1
      name: L1 grid setpoint
    - entity: sensor.electricity_planner_grid_setpoint_phase_2
      name: L2 grid setpoint
    - entity: sensor.electricity_planner_grid_setpoint_phase_3
      name: L3 grid setpoint
    - entity: sensor.electricity_planner_car_charger_limit
      name: Car charger limit

- type: markdown
  title: Phase 1 (L1) Status
  content: |
    {% set phase_results = state_attr('sensor.electricity_planner_grid_setpoint', 'phase_results') or state_attr('binary_sensor.electricity_planner_battery_charge_from_grid', 'phase_results') %}
    {% set phase_details = state_attr('sensor.electricity_planner_decision_diagnostics', 'phase_details') or state_attr('sensor.electricity_planner_decision_diagnostics_diagnostic', 'phase_details') %}
    {% set phase = phase_results.phase_1 if phase_results else None %}
    {% set details = phase_details.phase_1 if phase_details else None %}
    {% if phase %}
    | Metric | Value |
    |---|---:|
    | Battery charging | {{ 'On' if phase.battery_grid_charging else 'Off' }} |
    | Car charging | {{ 'On' if phase.car_grid_charging else 'Off' }} |
    | Actual grid power | {% if details and details.grid_power is not none %}{{ details.grid_power }} W{% else %}N/A{% endif %} |
    | Grid setpoint | {{ phase.grid_setpoint }} W |
    | Battery component | {{ phase.grid_components.battery }} W |
    | Car component | {{ phase.grid_components.car }} W |
    | Charger limit | {{ phase.charger_limit }} W |
    | Assigned batteries | {% if phase.battery_entities %}{{ phase.battery_entities | length }} ({{ (phase.capacity_share * 100) | round(1) }}%, {{ phase.capacity_share_kwh | round(1) }} kWh){% else %}None{% endif %} |

    **Battery reason:** {{ phase.battery_grid_charging_reason }}

    **Car reason:** {{ phase.car_grid_charging_reason }}
    {% else %}
    _Phase data unavailable_
    {% endif %}

- type: entities
  title: Phase 1 (L1) Entities
  show_header_toggle: false
  entities:
    - entity: binary_sensor.electricity_planner_battery_charge_from_grid
      name: L1 battery source
    - entity: binary_sensor.electricity_planner_car_charge_from_grid
      name: L1 car source
    - entity: sensor.electricity_planner_grid_setpoint
      name: Aggregate grid setpoint
    - entity: sensor.electricity_planner_grid_setpoint_phase_1
      name: L1 grid setpoint
    - entity: sensor.electricity_planner_car_charger_limit
      name: L1 charger source

