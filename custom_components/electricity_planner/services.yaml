# Services for Electricity Planner integration
set_manual_override:
  name: Set Manual Override
  description: Manually override battery/car charging decisions or numeric charger/grid limits
  fields:
    entry_id:
      name: Config Entry
      description: Target a specific Electricity Planner config entry when multiple are loaded
      required: false
      example: "abcd1234efgh5678"
      selector:
        text:
    target:
      name: Target
      description: Which manual override target to set (battery, car, both, charger_limit, or grid_setpoint)
      required: true
      example: "battery"
      selector:
        select:
          options:
            - "battery"
            - "car"
            - "both"
            - "charger_limit"
            - "grid_setpoint"
    action:
      name: Action
      description: Whether to force charging ON or wait (required for battery/car/both targets)
      required: false
      example: "force_charge"
      selector:
        select:
          options:
            - "force_charge"
            - "force_wait"
    duration:
      name: Duration (minutes)
      description: Optional number of minutes before the manual override automatically clears
      required: false
      example: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: "minutes"
    reason:
      name: Reason
      description: Optional reason for the override (for logging)
      required: false
      example: "Emergency charging needed"
      selector:
        text:
    charger_limit:
      name: Charger Limit (Watts)
      description: Manual override for car charger power limit. Use with target charger_limit or bundle with a car override.
      required: false
      example: 5000
      selector:
        number:
          min: 0
          max: 50000
          step: 100
          unit_of_measurement: "W"
    grid_setpoint:
      name: Grid Setpoint (Watts)
      description: Manual override for grid import/export power setpoint. Use with target grid_setpoint or bundle with a car override.
      required: false
      example: 8000
      selector:
        number:
          min: -50000
          max: 50000
          step: 100
          unit_of_measurement: "W"

clear_manual_override:
  name: Clear Manual Override
  description: Clear active manual overrides and return battery/car/charger/grid control to automatic decision making.
  fields:
    entry_id:
      name: Config Entry
      description: Target a specific Electricity Planner config entry when multiple are loaded
      required: false
      example: "abcd1234efgh5678"
      selector:
        text:
    target:
      name: Target
      description: Which manual override target to clear. all clears battery/car/charger_limit/grid_setpoint.
      required: false
      example: "all"
      default: "all"
      selector:
        select:
          options:
            - "battery"
            - "car"
            - "both"
            - "charger_limit"
            - "grid_setpoint"
            - "all"
