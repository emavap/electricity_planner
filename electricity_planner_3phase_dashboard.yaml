              {% set phase_results = state_attr('sensor.electricity_planner_grid_setpoint', 'phase_results') or state_attr('binary_sensor.electricity_planner_battery_charge_from_grid', 'phase_results') %}
              {% set phase_details = state_attr('sensor.electricity_planner_decision_diagnostics', 'phase_details') or state_attr('sensor.electricity_planner_decision_diagnostics_diagnostic', 'phase_details') %}
