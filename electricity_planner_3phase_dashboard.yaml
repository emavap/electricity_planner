              {% set details = phase_details.phase_1 if phase_details else None %}
              {% if phase %}
              | Metric | Value |
              |---|---:|
              | Battery charging | {{ 'On' if phase.battery_grid_charging else 'Off' }} |
              | Car charging | {{ 'On' if phase.car_grid_charging else 'Off' }} |
              | Actual grid power | {% if details and details.grid_power is not none %}{{ details.grid_power }} W{% else %}N/A{% endif %} |
              | Grid setpoint | {{ phase.grid_setpoint }} W |
              | Battery component | {{ phase.grid_components.battery }} W |
              | Car component | {{ phase.grid_components.car }} W |
              | Charger limit | {{ phase.charger_limit }} W |
              | Assigned batteries | {% if phase.battery_entities %}{{ phase.battery_entities | length }} ({{ (phase.capacity_share * 100) | round(1) }}%, {{ phase.capacity_share_kwh | round(1) }} kWh){% else %}None{% endif %} |

