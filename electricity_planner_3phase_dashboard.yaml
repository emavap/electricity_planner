# Three-Phase Electricity Planner Dashboard
# REQUIRED: Install "Gauge Card Pro" from HACS
# https://github.com/benjamin-dcs/gauge-card-pro
# REQUIRED: Install "ApexCharts Card" from HACS
# https://github.com/RomRider/apexcharts-card
# REQUIRED: Install "Button Card" from HACS
# https://github.com/custom-cards/button-card
# This bundled dashboard includes the same shared pricing/forecast/threshold
# surface as the single-phase dashboard, plus three-phase specific breakdowns.
views:
  - title: Overview
    path: electricity-planner
    icon: mdi:lightning-bolt
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## ⚡ Electricity Planner - Three-Phase Dashboard

              This dashboard includes the shared single-phase pricing, forecast,
              and decision data plus three-phase specific power allocations.
              Each phase (L1, L2, L3) operates independently based on battery assignments.

          # Price gauges (shared across all phases)
          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:gauge-card-pro
                entity: sensor.electricity_planner_current_electricity_price
                header: Buy price
                min: -0.9
                max: 0.9
                unit: "€/kWh"
                needle: true
                scale: "50px"
                segments: |-
                  {% set price_sensor = 'sensor.electricity_planner_current_electricity_price' %}
                  {% set dynamic_threshold = state_attr(price_sensor, 'dynamic_threshold') %}
                  {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics' %}
                  {% if states(decision_sensor) in ['unknown', 'unavailable', None] %}
                    {% set decision_sensor = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
                  {% endif %}
                  {% set price_analysis = state_attr(decision_sensor, 'price_analysis') %}
                  {% set average_threshold = price_analysis.average_threshold if price_analysis else None %}
                  {% set fixed_threshold = states('sensor.electricity_planner_diagnostics_monitoring_price_threshold') | float(0) %}
                  {% set price_threshold = state_attr(price_sensor, 'price_threshold') %}

                  {% if price_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set max_threshold = price_threshold | float(0) %}
                  {% elif average_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set max_threshold = average_threshold | float(0) %}
                  {% else %}
                    {% set max_threshold = fixed_threshold %}
                  {% endif %}

                  {% if dynamic_threshold not in [None, 'unknown', 'unavailable'] %}
                    {% set threshold = dynamic_threshold | float(0) %}
                  {% else %}
                    {% set threshold = max_threshold %}
                  {% endif %}
                  {% if threshold > max_threshold %}
                    {% set threshold = max_threshold %}
                  {% endif %}
                  {{
                    [
                      { "from": -0.9, "color": "green" },
                      { "from": threshold, "color": "yellow" },
                      { "from": max_threshold, "color": "red" }
                    ]
                  }}

              - type: custom:gauge-card-pro
                entity: sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price
                header: Feed-in price
                min: -0.9
                max: 0.9
                unit: "€/kWh"
                needle: true
                scale: "50px"
                segments: |-
                  {% set threshold = states('sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold') | float(0) %}
                  {{
                    [
                      { "from": -0.9, "color": "red" },
                      { "from": 0, "color": "yellow" },
                      { "from": threshold, "color": "green" }
                    ]
                  }}

          - type: grid
            square: false
            columns: 4
            cards:
              - type: button
                entity: binary_sensor.electricity_planner_battery_charge_from_grid
                name: Battery
                icon: mdi:battery-charging
                icon_height: 60px
                show_name: true
                show_state: true

              - type: button
                entity: binary_sensor.electricity_planner_car_charge_from_grid
                name: Car
                icon: mdi:car-electric
                icon_height: 60px
                show_name: true
                show_state: true
                tap_action:
                  action: more-info

              - type: button
                entity: binary_sensor.electricity_planner_data_nord_pool_available
                name: Data OK
                icon: mdi:database-check
                icon_height: 60px
                show_name: true
                show_state: true

              - type: button
                entity: binary_sensor.electricity_planner_solar_derating_alarm
                name: Derating alarm
                icon: mdi:alert-circle
                icon_height: 60px
                show_name: true
                show_state: true
                tap_action:
                  action: more-info

          - type: grid
            square: false
            columns: 2
            cards:
              - type: gauge
                name: Battery SOC (Average)
                entity: sensor.electricity_planner_battery_soc_average
                min: 0
                max: 100
                unit: "%"
                needle: true
                severity:
                  red: 0
                  yellow: 30
                  green: 70

          - type: markdown
            title: Active Grid Charging Limit
            content: |
              {% set sunny_entity = 'number.electricity_planner_max_soc_threshold_sunny' %}
              {% set normal_entity = 'number.electricity_planner_max_soc_threshold' %}
              {% set sunny_forecast_threshold_entity = 'number.electricity_planner_sunny_forecast_threshold_kwh' %}
              {% set sunny_active = state_attr(sunny_entity, 'sunny_day_active') %}
              {% if sunny_active %}
              🌞 **High Solar forecast** — grid charges battery to **{{ states(sunny_entity) }}%** max
              {% else %}
              🔋 **Standard** — grid charges battery to **{{ states(normal_entity) }}%** max
              {% endif %}

              _Solar forecast: {{ state_attr(sunny_entity, 'solar_forecast_kwh') or 'not available' }}_
              _Sunny mode trigger: ≥ {{ states(sunny_forecast_threshold_entity) }} kWh_

          - type: entities
            title: Status
            show_header_toggle: false
            entities:
              - entity: sensor.electricity_planner_diagnostics_monitoring_entity_status
                name: Entity status
              - entity: binary_sensor.electricity_planner_data_nord_pool_available
                name: Data OK
              - entity: sensor.electricity_planner_data_unavailable_duration
                name: Data unavailable time
              - entity: sensor.electricity_planner_battery_soc_average
                name: Battery SOC
              - entity: sensor.electricity_planner_solar_surplus_power
                name: Solar surplus
              - entity: binary_sensor.electricity_planner_solar_producing_power
                name: Solar producing
              - entity: binary_sensor.electricity_planner_price_below_threshold
                name: Price below threshold

          - type: entities
            title: Decisions
            show_header_toggle: false
            entities:
              - entity: sensor.electricity_planner_decision_diagnostics
                name: Planner decision summary
              - entity: binary_sensor.electricity_planner_battery_charge_from_grid
                name: Battery charging (any phase)
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_battery_charge_from_grid
                attribute: reason
                name: Battery reason
              - entity: binary_sensor.electricity_planner_car_charge_from_grid
                name: Car charging (any phase)
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_car_charge_from_grid
                attribute: reason
                name: Car reason
              - entity: binary_sensor.electricity_planner_solar_feed_in_grid
                name: Solar feed-in
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_solar_feed_in_grid
                attribute: reason
                name: Feed-in reason
              - entity: sensor.electricity_planner_car_charger_limit
                name: Car charger limit
              - type: attribute
                entity: sensor.electricity_planner_car_charger_limit
                attribute: charger_limit_reason
                name: Charger limit reason
              - entity: binary_sensor.electricity_planner_solar_derating_alarm
                name: Derating alarm
                secondary_info: last-changed
              - type: attribute
                entity: binary_sensor.electricity_planner_solar_derating_alarm
                attribute: reason
                name: Alarm reason
              - entity: sensor.electricity_planner_inverter_derating_target
                name: Inverter derating target
                secondary_info: last-changed
              - type: attribute
                entity: sensor.electricity_planner_inverter_derating_target
                attribute: inverter_derating_reason
                name: Derating reason
              - entity: sensor.electricity_planner_grid_setpoint
                name: Grid setpoint
              - type: attribute
                entity: sensor.electricity_planner_grid_setpoint
                attribute: grid_setpoint_reason
                name: Grid setpoint reason
              - type: attribute
                entity: switch.electricity_planner_arbitrage_mode
                attribute: reason
                name: Arbitrage reason
              - type: attribute
                entity: switch.electricity_planner_negative_arbitrage_buy_mode
                attribute: reason
                name: Negative Arbitrage Buy reason

  - title: Controls
    path: controls
    icon: mdi:tune-variant
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: Battery Controls
            show_header_toggle: false
            entities:
              - entity: number.electricity_planner_max_soc_threshold
                name: Grid Max SOC
                icon: mdi:battery-charging-high
              - entity: number.electricity_planner_max_soc_threshold_sunny
                name: Grid Max SOC (high solar)
                icon: mdi:weather-sunny
              - entity: number.electricity_planner_max_soc_threshold_solar
                name: Solar Max SOC
                icon: mdi:solar-power-variant
              - entity: number.electricity_planner_sunny_forecast_threshold_kwh
                name: Sunny Forecast Trigger
                icon: mdi:weather-partly-cloudy
              - entity: number.electricity_planner_arbitrage_mode_reserve_soc
                name: Arbitrage Reserve SOC
                icon: mdi:battery-arrow-down-outline
              - entity: number.electricity_planner_arbitrage_mode_reserve_soc_sunny
                name: Arbitrage Reserve SOC (sunny)
                icon: mdi:weather-sunny
              - entity: number.electricity_planner_arbitrage_mode_reserve_soc_solar
                name: Arbitrage Reserve SOC (solar)
                icon: mdi:solar-power-variant
              - entity: number.electricity_planner_arbitrage_mode_deadline_hour
                name: Arbitrage Deadline Hour
                icon: mdi:clock-end
              - entity: number.electricity_planner_negative_buy_threshold
                name: Negative Arbitrage Buy Threshold
                icon: mdi:cash-minus
              - entity: switch.electricity_planner_car_permissive_mode
                name: Car permissive
                icon: mdi:car-electric-outline
              - entity: switch.electricity_planner_arbitrage_mode
                name: Arbitrage mode
                icon: mdi:battery-arrow-down-outline
              - entity: switch.electricity_planner_negative_arbitrage_buy_mode
                name: Negative Arbitrage Buy Mode
                icon: mdi:battery-arrow-up-outline
              - entity: switch.electricity_planner_disable_battery_charging
                name: Disable Battery Charging
                icon: mdi:battery-off

          - type: markdown
            content: |
              **Battery Controls — quick reference**

              *Grid charging limits*

              - **Grid Max SOC** (default 70%): SOC ceiling for grid charging on normal days. The planner stops buying once the average battery SOC reaches this level.
              - **Grid Max SOC (high solar)** (default 35%): Lower ceiling that replaces *Grid Max SOC* whenever tomorrow's solar forecast exceeds the *Sunny Forecast Trigger*. Preserves capacity for free solar.
              - **Solar Max SOC** (default 50%): Independent ceiling for solar absorption. Once the average battery SOC crosses this level, surplus is offered to the EV or exported when feed-in is profitable.
              - **Sunny Forecast Trigger** (default 5 kWh): Tomorrow-forecast value above which *Grid Max SOC (high solar)* activates. Read after the configured forecast start hour (default 20:00).

              *Arbitrage*

              - **Arbitrage Reserve SOC** (default 50%): Base reserve SOC used during arbitrage mode on an average day. Exports stop at this floor.
              - **Arbitrage Reserve SOC (Sunny)** (default 30%): Lower reserve that replaces the base when tomorrow's solar forecast is high. Sells more battery capacity the day before to make room for incoming solar and avoid inverter derating.
              - **Arbitrage Reserve SOC (Solar)** (default 60%): Higher reserve used while solar absorption is active (battery below Solar Max SOC with surplus). Keeps more in the battery to let solar fill it.
              - **Arbitrage Deadline Hour** (default 12): Local hour by which both arbitrage *sell* and *Negative Arbitrage Buy* slot windows must finish. Protects the morning solar harvest.
              - **Negative Arbitrage Buy Threshold** (default −0.05 €/kWh): Net buy price at or below which the planner requests peak-limited grid import (truly paid-to-consume). More-negative values mean stricter activation.

              *Mode toggles*

              - **Car permissive**: Relaxes car-charging hysteresis — accepts ~20% higher prices and bypasses the minimum-window check for ad-hoc top-ups.
              - **Arbitrage mode**: Enables battery-to-grid export during high feed-in prices, down to *Arbitrage Reserve SOC*, before the deadline hour.
              - **Negative Arbitrage Buy Mode**: Enables peak-limited grid import during net-negative price slots.
              - **Disable Battery Charging**: Persistently blocks all grid charging into batteries, overriding every automatic strategy.

          - type: markdown
            title: Manual override status
            content: >
              {% set diag_entity = 'sensor.electricity_planner_decision_diagnostics' %}
              {% if states(diag_entity) in ['unknown', 'unavailable', None] %}
              {% set diag_entity = 'sensor.electricity_planner_decision_diagnostics_diagnostic' %}
              {% endif %}
              {% set decisions = state_attr(diag_entity, 'decisions') %}
              {% set overrides = decisions.manual_overrides if decisions else state_attr(diag_entity, 'manual_overrides') %}
              {% if overrides %}
              {% for key, value in overrides.items() %}
              {% set target_name = {
                'battery_grid_charging': 'Battery charging',
                'car_grid_charging': 'Car charging',
                'charger_limit': 'Charger limit',
                'grid_setpoint': 'Grid setpoint'
              }.get(key, key | replace('_', ' ') | title) %}
              {% set until = value.expires_at | default(None) %}
              {% set reason = value.reason | default('') %}
              {% if key in ['charger_limit', 'grid_setpoint'] %}
              **{{ target_name }}:** {{ value.value }}W{% if until %} (until {{ as_datetime(until).astimezone().strftime('%H:%M') }}){% endif %}{% if reason %} — {{ reason }}{% endif %}
              {% else %}
              {% set mode = 'charging' if value.value else 'waiting' %}
              **{{ target_name }}:** {{ mode }}{% if until %} (until {{ as_datetime(until).astimezone().strftime('%H:%M') }}){% endif %}{% if reason %} — {{ reason }}{% endif %}
              {% endif %}

              {% endfor %}
              {% else %}
              _No manual overrides active_
              {% endif %}

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Battery charge
                icon: mdi:battery-arrow-up
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.set_manual_override
                  service_data: |
                    [[[
                      const input = prompt('Battery override duration (minutes)', '120');
                      if (input === null) {
                        return;
                      }
                      const minutes = parseInt(input, 10);
                      const duration = Number.isFinite(minutes) ? Math.min(Math.max(minutes, 1), 1440) : 120;
                      return {
                        target: 'battery',
                        action: 'force_charge',
                        duration,
                        reason: 'Dashboard boost'
                      };
                    ]]]
              - type: custom:button-card
                name: Battery wait
                icon: mdi:battery-remove
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.set_manual_override
                  service_data: |
                    [[[
                      const input = prompt('Battery override duration (minutes)', '120');
                      if (input === null) {
                        return;
                      }
                      const minutes = parseInt(input, 10);
                      const duration = Number.isFinite(minutes) ? Math.min(Math.max(minutes, 1), 1440) : 120;
                      return {
                        target: 'battery',
                        action: 'force_wait',
                        duration,
                        reason: 'Dashboard pause'
                      };
                    ]]]
              - type: custom:button-card
                name: Car charge
                icon: mdi:car-arrow-right
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.set_manual_override
                  service_data: |
                    [[[
                      const input = prompt('Car override duration (minutes)', '120');
                      if (input === null) {
                        return;
                      }
                      const minutes = parseInt(input, 10);
                      const duration = Number.isFinite(minutes) ? Math.min(Math.max(minutes, 1), 1440) : 120;
                      return {
                        target: 'car',
                        action: 'force_charge',
                        duration,
                        reason: 'Dashboard boost'
                      };
                    ]]]
              - type: custom:button-card
                name: Car wait
                icon: mdi:car-clock
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.set_manual_override
                  service_data: |
                    [[[
                      const input = prompt('Car override duration (minutes)', '120');
                      if (input === null) {
                        return;
                      }
                      const minutes = parseInt(input, 10);
                      const duration = Number.isFinite(minutes) ? Math.min(Math.max(minutes, 1), 1440) : 120;
                      return {
                        target: 'car',
                        action: 'force_wait',
                        duration,
                        reason: 'Dashboard pause'
                      };
                    ]]]
              - type: custom:button-card
                name: Clear all
                icon: mdi:restore
                size: 20%
                styles:
                  card:
                    - height: 60px
                  name:
                    - font-size: 11px
                  icon:
                    - width: 20px
                tap_action:
                  action: call-service
                  service: electricity_planner.clear_manual_override
                  data:
                    target: all

  - title: Prices
    path: prices
    icon: mdi:chart-line
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: custom:apexcharts-card
            header:
              title: Electricity Buy Prices (History + Future)
              show: true
            graph_span: 38h
            span:
              start: hour
              offset: -2h
            now:
              show: true
              label: Now
            apex_config:
              chart:
                height: 350
              tooltip:
                enabled: false
              xaxis:
                labels:
                  datetimeFormatter:
                    hour: "HH:mm"
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#7f8c8d"
                    strokeDashArray: 4
                    label:
                      text: Break-even
              yaxis:
                decimalsInFloat: 4
                tickAmount: 20
                labels:
                  formatter: |
                    EVAL:function(value) {
                      return value.toFixed(4) + ' €/kWh';
                    }
            series:
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Transport cost
                type: line
                stroke_width: 1
                color: "#b9770e"
                curve: straight
                opacity: 0.85
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.transport_cost ?? 0];
                  });
                show:
                  legend_value: false
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Raw market price
                type: line
                stroke_width: 1
                color: "#566573"
                curve: straight
                opacity: 0.8
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.raw_price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Total buy price
                type: line
                stroke_width: 3
                color: "#1f618d"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Max Threshold
                type: line
                stroke_width: 2
                color: "#c0392b"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const currentPriceEntity = hass.states['sensor.electricity_planner_current_electricity_price'];
                  const diagnosticsEntity = hass.states['sensor.electricity_planner_decision_diagnostics'] ?? hass.states['sensor.electricity_planner_decision_diagnostics_diagnostic'];
                  const priceAnalysis = diagnosticsEntity?.attributes?.price_analysis;
                  const activeThreshold = currentPriceEntity?.attributes?.price_threshold;
                  const diagnosticsThreshold = priceAnalysis?.price_threshold;

                  const maxThresholdEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_price_threshold'];
                  const fixedThreshold = maxThresholdEntity ? parseFloat(maxThresholdEntity.state) : 0.15;

                  let maxThreshold = fixedThreshold;
                  if (activeThreshold != null && activeThreshold !== undefined) {
                    maxThreshold = parseFloat(activeThreshold);
                  } else if (diagnosticsThreshold != null && diagnosticsThreshold !== undefined) {
                    maxThreshold = parseFloat(diagnosticsThreshold);
                  }

                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }

                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();

                  return [
                    [startTime, maxThreshold],
                    [endTime, maxThreshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Dynamic Threshold
                type: line
                stroke_width: 3
                color: "#e67e22"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const currentPriceEntity = hass.states['sensor.electricity_planner_current_electricity_price'];
                  const dynamicThreshold = currentPriceEntity?.attributes?.dynamic_threshold;

                  if (dynamicThreshold == null || dynamicThreshold === undefined) {
                    return [];
                  }

                  const threshold = parseFloat(dynamicThreshold);

                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }

                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();

                  return [
                    [startTime, threshold],
                    [endTime, threshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Negative Arbitrage Buy Threshold
                type: line
                stroke_width: 2
                color: "#16a085"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const buySwitch = hass.states['switch.electricity_planner_negative_arbitrage_buy_mode'];
                  const threshold = buySwitch?.attributes?.threshold;
                  if (buySwitch?.state !== 'on' || threshold == null || threshold === undefined) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, parseFloat(threshold)],
                    [endTime, parseFloat(threshold)]
                  ];

          - type: custom:apexcharts-card
            header:
              title: Electricity Sell Prices (History + Future)
              show: true
            graph_span: 38h
            span:
              start: hour
              offset: -2h
            now:
              show: true
              label: Now
            apex_config:
              chart:
                height: 300
              tooltip:
                enabled: false
              xaxis:
                labels:
                  datetimeFormatter:
                    hour: "HH:mm"
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "#7f8c8d"
                    strokeDashArray: 4
                    label:
                      text: Break-even
              yaxis:
                decimalsInFloat: 4
                tickAmount: 16
                labels:
                  formatter: |
                    EVAL:function(value) {
                      return value.toFixed(4) + ' €/kWh';
                    }
            series:
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Raw market price
                type: line
                stroke_width: 1
                color: "#566573"
                curve: straight
                opacity: 0.8
                show:
                  legend_value: false
                data_generator: |
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    return [new Date(interval.start).getTime(), interval.raw_price ?? 0];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Net feed-in price
                type: line
                stroke_width: 3
                color: "#1d8348"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const feedInEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_current_feed_in_price'];
                  const multiplier = parseFloat(feedInEntity?.attributes?.feedin_multiplier ?? 1);
                  const offset = parseFloat(feedInEntity?.attributes?.feedin_offset ?? 0);
                  const intervals = entity.attributes.data ?? [];
                  return intervals.map((interval) => {
                    const rawPrice = interval.raw_price ?? 0;
                    return [new Date(interval.start).getTime(), (rawPrice * multiplier) + offset];
                  });
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Feed-in Threshold
                type: line
                stroke_width: 2
                color: "#d4ac0d"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const thresholdEntity = hass.states['sensor.electricity_planner_diagnostics_monitoring_feed_in_price_threshold'];
                  const threshold = thresholdEntity ? parseFloat(thresholdEntity.state) : null;
                  if (threshold == null || Number.isNaN(threshold)) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, threshold],
                    [endTime, threshold]
                  ];
              - entity: sensor.electricity_planner_diagnostics_monitoring_nord_pool_prices
                name: Arbitrage Threshold
                type: line
                stroke_width: 2
                color: "#7d3c98"
                curve: straight
                show:
                  legend_value: false
                data_generator: |
                  const arbitrageSwitch = hass.states['switch.electricity_planner_arbitrage_mode'];
                  const threshold = arbitrageSwitch?.attributes?.arbitrage_price_threshold;
                  if (arbitrageSwitch?.state !== 'on' || threshold == null || threshold === undefined) {
                    return [];
                  }
                  if (!entity.attributes.data || entity.attributes.data.length === 0) {
                    return [];
                  }
                  const intervals = entity.attributes.data;
                  const startTime = new Date(intervals[0].start).getTime();
                  const lastInterval = intervals[intervals.length - 1];
                  const endTime = new Date(lastInterval.end ?? lastInterval.start).getTime();
                  return [
                    [startTime, parseFloat(threshold)],
                    [endTime, parseFloat(threshold)]
                  ];

